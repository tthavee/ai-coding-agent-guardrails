name: AI Guardrails CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# Prevent concurrent runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────
  # 1. PR Policy Checks — AI disclosure + security checklist
  # ──────────────────────────────────────────────
  pr-policy:
    name: PR Policy Compliance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check AI disclosure section is present
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          if ! echo "$PR_BODY" | grep -q "AI Assistance Disclosure"; then
            echo "ERROR: PR template's 'AI Assistance Disclosure' section is missing."
            echo "Please use the PR template and complete the AI disclosure section."
            exit 1
          fi

      - name: Check security checklist is completed
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          # Detect unchecked security items (lines starting with "- [ ]" in security section)
          UNCHECKED=$(echo "$PR_BODY" | grep -A 20 "Security Checklist" | grep -c "- \[ \]" || true)
          if [ "$UNCHECKED" -gt 0 ]; then
            echo "ERROR: $UNCHECKED item(s) in the Security Checklist are unchecked."
            exit 1
          fi

      - name: Check AI-generated code is tagged when substantial AI usage is disclosed
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce AI tagging in diff
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"

          # Determine AI involvement level from checked boxes in PR template
          SUBSTANTIAL=0
          AGENT_MODE=0

          # Check if "Copilot generated substantial function/class bodies" is checked
          if echo "$PR_BODY" | grep -q "\- \[x\] Copilot generated substantial"; then
            SUBSTANTIAL=1
          fi
          # Check if "Copilot Agent ran multi-step autonomous tasks" is checked
          if echo "$PR_BODY" | grep -q "\- \[x\] Copilot Agent ran"; then
            AGENT_MODE=1
          fi

          if [ "$SUBSTANTIAL" -eq 1 ] || [ "$AGENT_MODE" -eq 1 ]; then
            echo "Substantial or agent-mode AI usage disclosed. Checking for '# generated: copilot' tags..."
            DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.py' '*.ts' '*.js' '*.go' '*.java')

            if ! echo "$DIFF" | grep -q "generated: copilot"; then
              echo ""
              echo "ERROR: PR discloses substantial AI-generated code but no tagging comments found."
              echo "Per AGENTS.md section 7, AI-generated blocks must include a trailing comment:"
              echo "  Python/Go:      # generated: copilot — reviewed by: <your-name>"
              echo "  Java/JS/TS:     // generated: copilot — reviewed by: <your-name>"
              echo ""
              echo "Add the tag to each AI-generated function or class, then push again."
              exit 1
            fi

            TAG_COUNT=$(echo "$DIFF" | grep -c "generated: copilot" || true)
            echo "OK: Found $TAG_COUNT 'generated: copilot' tag(s) in the diff."
          else
            echo "No substantial AI usage disclosed — tagging check skipped."
          fi

  # ──────────────────────────────────────────────
  # 2. AI Tag Enforcement — every new function must be attributed
  # ──────────────────────────────────────────────
  ai-tag-enforcement:
    name: AI Tag Enforcement
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check attribution tags on all new Python and Java functions
        run: |
          python scripts/check_ai_tags.py origin/${{ github.base_ref }}

  # ──────────────────────────────────────────────
  # 3. Secret Scanning — blocks on any detected secret
  # ──────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run detect-secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline --report --only-allowlisted

  # ──────────────────────────────────────────────
  # 4. Unit Tests + Coverage Enforcement
  # ──────────────────────────────────────────────
  test-and-coverage:
    name: Tests & Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ----- Node.js / TypeScript -----
      - name: Setup Node (if applicable)
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run Node tests with coverage
        if: hashFiles('package.json') != ''
        run: |
          npm ci
          npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
          # Enforce thresholds (configure in jest.config.js or vitest.config.ts)

      # ----- Python -----
      - name: Setup Python (if applicable)
        if: hashFiles('requirements.txt') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python tests with coverage
        if: hashFiles('requirements.txt') != ''
        run: |
          pip install pytest pytest-cov
          pytest --cov=src --cov-report=xml --cov-fail-under=80

      # ----- Go -----
      - name: Run Go tests with coverage
        if: hashFiles('go.mod') != ''
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out
          # Fail if total coverage < 80%
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage $COVERAGE% is below the required 80%"
            exit 1
          fi

      # ----- Java (Maven) -----
      - name: Setup Java (if Maven project)
        if: hashFiles('pom.xml') != ''
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Java tests with coverage (Maven)
        if: hashFiles('pom.xml') != ''
        run: |
          mvn verify jacoco:report
          # Fail if line coverage < 80% (requires jacoco-maven-plugin configured in pom.xml)
          mvn jacoco:check

      # ----- Java (Gradle) -----
      - name: Setup Java (if Gradle project)
        if: hashFiles('build.gradle') != '' || hashFiles('build.gradle.kts') != ''
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Java tests with coverage (Gradle)
        if: hashFiles('build.gradle') != '' || hashFiles('build.gradle.kts') != ''
        run: |
          ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # ──────────────────────────────────────────────
  # 5. Protected File Change Detection
  # ──────────────────────────────────────────────
  protected-files:
    name: Protected File Guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes to protected files
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          PROTECTED_CHANGED=0
          for file in AGENTS.md .github/workflows/ .github/CODEOWNERS; do
            if echo "$CHANGED" | grep -q "$file"; then
              echo "WARNING: Protected file changed: $file"
              PROTECTED_CHANGED=1
            fi
          done

          if [ "$PROTECTED_CHANGED" -eq 1 ]; then
            echo ""
            echo "ERROR: Changes to protected files detected."
            echo "These files require a Staff Engineer or Security team member to approve."
            echo "Please add a justification in your PR description under 'Escalation and Override'."
            exit 1
          fi
